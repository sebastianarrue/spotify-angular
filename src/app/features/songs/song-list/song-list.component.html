<div class="min-h-full">
  <div class="bg-linear-to-b from-indigo-900/60 via-[var(--spotify-dark-gray)] to-[var(--spotify-dark-gray)]">
    <div class="px-8 pt-24 pb-8">
      <div class="flex items-end gap-6 mb-8">
        <div class="w-56 h-56 bg-linear-to-br from-indigo-800 to-indigo-600 rounded-lg shadow-2xl flex items-center justify-center flex-shrink-0">
          <svg lucideMusic class="w-24 h-24 text-white/60"></svg>
        </div>
        <div class="flex-1">
          <span class="text-xs uppercase font-bold tracking-widest text-white/70">Dashboard</span>
          <h1 class="text-5xl font-bold mt-2 mb-4 leading-tight">All Songs</h1>
          <p class="text-sm text-[var(--spotify-lightest-gray)]">{{ songService.songs()?.length || 0 }} songs</p>
        </div>
      </div>
    </div>
  </div>

  <div class="px-8 -mt-4 pb-24 space-y-8">
    <div class="flex items-center justify-between">
      <h2 class="text-2xl font-bold">Focus</h2>
      <button (click)="showCreateForm.set(!showCreateForm())" class="bg-[var(--spotify-green)] text-black font-bold px-6 py-2.5 rounded-full text-sm hover:scale-105 active:scale-95 transition-all cursor-pointer">
        {{ showCreateForm() ? 'Cancel' : 'Add Song' }}
      </button>
    </div>

    @if (showCreateForm()) {
      <div class="bg-[var(--spotify-card-gray)] p-6 rounded-lg animate-[slide-up_0.2s_ease-out]">
        <form [formGroup]="songForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-1">
            <label class="block text-xs font-bold uppercase tracking-wider text-[var(--spotify-lightest-gray)]">Title</label>
            <input formControlName="title" class="w-full bg-[var(--spotify-dark-gray)] border border-white/10 rounded p-2.5 text-sm text-white focus:outline-none focus:border-[var(--spotify-green)] transition-colors placeholder:text-[var(--spotify-lightest-gray)]" placeholder="Song title">
          </div>
          <div class="space-y-1">
            <label class="block text-xs font-bold uppercase tracking-wider text-[var(--spotify-lightest-gray)]">Author</label>
            <input formControlName="author" class="w-full bg-[var(--spotify-dark-gray)] border border-white/10 rounded p-2.5 text-sm text-white focus:outline-none focus:border-[var(--spotify-green)] transition-colors placeholder:text-[var(--spotify-lightest-gray)]" placeholder="Artist name">
          </div>
          <div class="space-y-1">
            <label class="block text-xs font-bold uppercase tracking-wider text-[var(--spotify-lightest-gray)]">Album</label>
            <input formControlName="album" class="w-full bg-[var(--spotify-dark-gray)] border border-white/10 rounded p-2.5 text-sm text-white focus:outline-none focus:border-[var(--spotify-green)] transition-colors placeholder:text-[var(--spotify-lightest-gray)]" placeholder="Album name">
          </div>
          <div class="space-y-1">
            <label class="block text-xs font-bold uppercase tracking-wider text-[var(--spotify-lightest-gray)]">Image</label>
            <input type="file" (change)="onFileSelected($event)" class="w-full text-sm text-[var(--spotify-lightest-gray)] file:mr-3 file:py-1.5 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-[var(--spotify-green)] file:text-black hover:file:scale-105 file:transition-all cursor-pointer">
          </div>
          <div class="md:col-span-2">
            <button type="submit" [disabled]="songForm.invalid || !selectedFile" class="bg-[var(--spotify-green)] text-black font-bold px-8 py-2.5 rounded-full text-sm hover:scale-105 active:scale-95 transition-all disabled:opacity-50 disabled:hover:scale-100 cursor-pointer">Save Song</button>
          </div>
        </form>
      </div>
    }

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-5">
      @for (song of songService.songs() || []; track song._id) {
        <app-song-card [song]="song" (delete)="onDelete($event)" (addToPlaylist)="openAddToPlaylistModal($event)"></app-song-card>
      }
    </div>
  </div>

  @if (selectedSong()) {
    <div class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 animate-[fade-in_0.15s_ease-out]">
      <div class="bg-[var(--spotify-card-gray)] p-6 rounded-xl w-full max-w-sm shadow-2xl animate-[slide-up_0.2s_ease-out]">
        <h2 class="text-lg font-bold mb-5">Add to playlist</h2>
        <div class="space-y-1 max-h-64 overflow-y-auto">
          @for (playlist of playlistService.playlists() || []; track playlist.id) {
            <button (click)="addSongToPlaylist(playlist.id)" class="w-full text-left px-3 py-2.5 text-sm rounded text-[var(--spotify-lightest-gray)] hover:text-white hover:bg-white/10 transition-colors cursor-pointer">
              {{ playlist.name }}
            </button>
          }
        </div>
        <button (click)="selectedSong.set(null)" class="mt-6 w-full text-sm font-bold text-[var(--spotify-lightest-gray)] hover:text-white transition-colors cursor-pointer">Close</button>
      </div>
    </div>
  }
</div>
