<div class="song-card">
  <img [src]="imageUrl" class="w-full aspect-square object-cover rounded-md mb-4 shadow-lg">

  <button class="play-button">
    <svg lucidePlay class="w-5 h-5 text-black ml-0.5"></svg>
  </button>

  <div class="icon-group">
    <button (click)="addToPlaylist.emit(song())" class="icon-btn" title="Add to playlist">
      <svg lucidePlus class="w-3.5 h-3.5 text-white"></svg>
    </button>
    <button (click)="delete.emit(song()._id)" class="icon-btn" title="Delete song">
      <svg lucideTrash2 class="w-3.5 h-3.5 text-white"></svg>
    </button>
  </div>

  <h3 class="font-bold text-sm truncate text-white">{{ song().title }}</h3>
  <p class="text-sm text-[var(--spotify-lightest-gray)] truncate">{{ song().author }}</p>
</div>
