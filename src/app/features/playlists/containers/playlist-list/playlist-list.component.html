<div class="px-8 pt-24 pb-24 space-y-8">
  <div class="flex items-center justify-between">
    <h1 class="text-3xl font-bold">Your Playlists</h1>
    <button (click)="showCreateForm.set(!showCreateForm())" class="btn-primary">
      {{ showCreateForm() ? 'Cancel' : 'Create Playlist' }}
    </button>
  </div>

  @if (showCreateForm()) {
    <div class="card--form">
      <form [formGroup]="playlistForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div class="space-y-1">
          <label class="label">Name</label>
          <input formControlName="name" class="input-field" placeholder="My playlist">
        </div>
        <div class="space-y-1">
          <label class="label">Description</label>
          <textarea formControlName="description" class="input-field" placeholder="Optional description" rows="3"></textarea>
        </div>
        <button type="submit" [disabled]="playlistForm.invalid" class="btn-primary">Create</button>
      </form>
    </div>
  }

  <div class="content-grid">
    @for (playlist of playlistFacade.playlists() || []; track playlist.id) {
      <a [routerLink]="['/playlists', playlist.id]" class="card group block">
        <div class="w-full aspect-square bg-linear-to-br from-gray-700 to-gray-900 rounded-md flex items-center justify-center mb-4 shadow-lg">
          <svg lucideMusic class="w-14 h-14 text-[var(--spotify-lightest-gray)] opacity-60"></svg>
        </div>
        <h3 class="font-bold text-sm truncate mb-0.5 text-white">{{ playlist.name }}</h3>
        <div class="flex items-center justify-between">
          <p class="text-sm text-[var(--spotify-lightest-gray)] truncate flex-1">{{ playlist.description || 'No description' }}</p>
          <button (click)="$event.preventDefault(); $event.stopPropagation(); onDelete(playlist.id)" class="btn-icon" title="Delete playlist">
            <svg lucideTrash2 class="w-4 h-4"></svg>
          </button>
        </div>
      </a>
    }
  </div>
</div>
