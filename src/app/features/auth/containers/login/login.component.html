<div class="auth-page">
  <div class="auth-card">
    <div class="text-center mb-8">
      <h1 class="auth-title">
        <span class="text-[var(--spotify-green)]">Spotify</span>
      </h1>
      <p class="text-zinc-400 text-sm mt-2">Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="space-y-1">
        <label class="label--auth">Email address</label>
        <input formControlName="email" type="email" class="input-field--auth" placeholder="you@example.com">
      </div>
      <div class="space-y-1">
        <label class="label--auth">Password</label>
        <input formControlName="password" type="password" class="input-field--auth" placeholder="••••••••">
      </div>
      <button type="submit" [disabled]="loginForm.invalid" class="btn-primary--full">
        Sign In
      </button>
    </form>

    <div class="auth-divider">
      <p>Don't have an account? <a routerLink="/signup" class="auth-link">Sign up</a></p>
    </div>
  </div>
</div>
