<div class="w-64 bg-black h-full flex flex-col select-none">
    <div class="p-6 pb-4">
      <h1 class="text-3xl font-bold tracking-tight">
        <span class="text-[var(--spotify-green)]">Spotify</span>
      </h1>
    </div>

    <nav class="px-3 flex flex-col space-y-1 mb-6">
      <a routerLink="/dashboard" routerLinkActive="text-white bg-white/10" class="flex items-center space-x-4 py-2 px-3 rounded-md text-[var(--spotify-lightest-gray)] hover:text-white transition-colors">
        <svg lucideHome class="w-6 h-6"></svg>
        <span class="font-semibold text-sm">Home</span>
      </a>
      <a routerLink="/playlists" routerLinkActive="text-white bg-white/10" class="flex items-center space-x-4 py-2 px-3 rounded-md text-[var(--spotify-lightest-gray)] hover:text-white transition-colors">
        <svg lucideLibrary class="w-6 h-6"></svg>
        <span class="font-semibold text-sm">Your Library</span>
      </a>
    </nav>

    <div class="flex-1 px-3 overflow-y-auto">
      <div class="bg-[var(--spotify-card-gray)] rounded-lg p-4 space-y-3">
        <div class="flex items-center justify-between">
          <span class="text-xs uppercase font-bold tracking-widest text-[var(--spotify-lightest-gray)]">Playlists</span>
          <button (click)="showCreateForm.set(!showCreateForm())" class="p-1 text-[var(--spotify-lightest-gray)] hover:text-white transition-colors cursor-pointer">
            @if (showCreateForm()) {
              <svg lucideX class="w-4 h-4"></svg>
            } @else {
              <svg lucidePlus class="w-4 h-4"></svg>
            }
          </button>
        </div>

        @if (showCreateForm()) {
          <form [formGroup]="playlistForm" (ngSubmit)="onCreate()" class="space-y-2" (click)="$event.stopPropagation()">
            <input formControlName="name" class="w-full bg-[var(--spotify-dark-gray)] border border-white/10 rounded p-2 text-xs text-white focus:outline-none focus:border-[var(--spotify-green)] transition-colors placeholder:text-[var(--spotify-lightest-gray)]" placeholder="Playlist name" required>
            <input formControlName="description" class="w-full bg-[var(--spotify-dark-gray)] border border-white/10 rounded p-2 text-xs text-white focus:outline-none focus:border-[var(--spotify-green)] transition-colors placeholder:text-[var(--spotify-lightest-gray)]" placeholder="Description (optional)">
            <button type="submit" [disabled]="playlistForm.invalid" class="w-full bg-[var(--spotify-green)] text-black font-bold text-xs py-1.5 rounded-full hover:scale-105 active:scale-95 transition-all disabled:opacity-50 disabled:hover:scale-100 cursor-pointer">Create</button>
          </form>
        }

        @for (playlist of playlistFacade.playlists() || []; track playlist.id) {
          <a [routerLink]="['/playlists', playlist.id]" class="text-sm text-[var(--spotify-lightest-gray)] hover:text-white transition-colors truncate block py-0.5">
            {{ playlist.name }}
          </a>
        }
      </div>
    </div>
</div>
