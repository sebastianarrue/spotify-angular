<div class="topbar">
  <div class="user-menu">
    <div class="user-avatar">
      <svg lucideUser class="w-3.5 h-3.5 text-white"></svg>
    </div>
    <span class="user-email">{{ authFacade.currentUser()?.email || 'Guest' }}</span>
    <button (click)="authFacade.logout().subscribe(); $event.stopPropagation()" class="logout-btn" title="Log out">
      <svg lucideLogOut class="w-4 h-4"></svg>
    </button>
  </div>
</div>
